<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review Wrong Answers — GATE DA Master</title>
  <link rel="stylesheet" href="css/global.css"><link rel="stylesheet" href="css/themes/dark.css"><link rel="stylesheet" href="css/themes/blue.css"><link rel="stylesheet" href="css/themes/green.css"><link rel="stylesheet" href="css/components.css"><link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <nav class="navbar"><a href="index.html" class="navbar-brand"><div class="navbar-brand-icon">📊</div><span>GATE DA Master</span></a><div class="navbar-nav" id="navbarNav"><a href="index.html" class="nav-link">🏠 Home</a><a href="dashboard.html" class="nav-link">📈 Dashboard</a><a href="review.html" class="nav-link active">🔄 Review</a></div><div class="nav-actions"><button class="btn-icon btn-ghost" id="themeToggle">🌙</button><div class="hamburger" onclick="document.getElementById('navbarNav').classList.toggle('mobile-open')"><span></span><span></span><span></span></div></div></nav>
  <div class="page-wrapper"><div class="container page-content">
    <div class="page-header"><h1 class="page-title">🔄 Review Wrong Answers</h1><p class="page-subtitle">Learn from your mistakes — review and reattempt</p></div>
    <div id="wrongList"></div>
  </div></div>
  <div class="toast-container" id="toastContainer"></div>
  <script src="js/utils.js"></script><script src="js/storage.js"></script><script src="js/theme.js"></script><script src="js/data-loader.js"></script>
  <script>
  function initReview() {
    const wrong = Storage.getAllWrongQuestions();
    const list = document.getElementById('wrongList');
    if (!list) return;
    if (wrong.length === 0) { list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">✅</div><h3>No wrong answers!</h3><p>Great job! Keep practicing to maintain your accuracy.</p><a href="index.html" class="btn btn-primary">Continue Practicing</a></div>'; return; }
    const grouped = {};
    wrong.forEach(w => { const key = w.subject; if (!grouped[key]) grouped[key] = []; grouped[key].push(w); });
    list.innerHTML = Object.entries(grouped).map(([subj, items]) => {
      const info = DataLoader.getSubjectInfo(subj);
      return `<div class="card" style="margin-bottom:16px"><div class="card-header"><h3>${info?.icon || '📝'} ${info?.name || subj}</h3><span class="badge badge-error">${items.length} wrong</span></div>
        <div class="card-body">${items.slice(0, 10).map(w => `<div style="padding:8px 0;border-bottom:1px solid var(--color-divider);font-size:14px">${DataLoader.getTopicName(w.topic)} — ${w.questionId}</div>`).join('')}
        ${items.length > 10 ? `<div style="padding:8px 0;color:var(--color-text-muted);font-size:13px">...and ${items.length - 10} more</div>` : ''}</div>
        <div class="card-footer"><a href="quiz/quiz-engine.html?subject=${subj}&topic=${items[0].topic}&mode=practice&count=20" class="btn btn-primary btn-sm">Practice This Subject</a></div></div>`;
    }).join('');
  }
  document.addEventListener('DOMContentLoaded', () => { Storage.init(); Theme.init(); initReview(); });
  </script>
</body>
</html>
